add_newline = false

# A minimal left prompt
format = """$directory$character"""

palette = "tokyo_night_storm"

# move the rest of the prompt to the right
right_format = """$all"""

command_timeout = 2000


[character]
vicmd_symbol = "[N] >>>"
success_symbol = '[➜ :](bold green)'
error_symbol = '[➜ :](bold red)'


[directory.substitutions]
'~/tests/starship-custom' = 'work-project'


[git_branch]
format = '[$symbol$branch (:$remote_branch)]($style)'
symbol = " "
style = "bold #f7768e"


[aws]
format = '[$symbol(profile: "$profile" )(\(region: $region\) )]($style)'
disabled = true
style = 'bold #7aa2f7'
symbol = " "


[golang]
format = '[ ](bold #7dcfff)'


[kubernetes]
symbol = '☸ '
disabled = true
detect_files = ['Dockerfile']
format = '[$symbol$context( \($namespace\))]($style) '
contexts = [
  { context_pattern = "arn:aws:eks:us-west-2:577926974532:cluster/zd-pvc-omer", style = "#9ece6a", context_alias = "omerxx", symbol = " " },
]


[docker_context]
disabled = true


[git_status]
style = "bold #bb9af7"


[palettes.tokyo_night_storm]
background = "#24283b"
foreground = "#c0caf5"

black = "#1d202f"
red = "#f7768e"
green = "#9ece6a"
yellow = "#e0af68"
blue = "#7aa2f7"
magenta = "#bb9af7"
cyan = "#7dcfff"
white = "#a9b1d6"

bright_black = "#414868"
bright_red = "#f7768e"
bright_green = "#9ece6a"
bright_yellow = "#e0af68"
bright_blue = "#7aa2f7"
bright_magenta = "#bb9af7"
bright_cyan = "#7dcfff"
bright_white = "#c0caf5"
