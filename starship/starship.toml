add_newline = false

format = """$directory$character"""

palette = "one_dark_pro"

right_format = """$all"""

command_timeout = 2000

[character]
vicmd_symbol = "[N] >>>"
success_symbol = '[➜ :](bold #56b6c2)'
error_symbol = '[➜ :](bold #e06c75)'

[directory.substitutions]
'~/tests/starship-custom' = 'work-project'

[git_branch]
format = '[$symbol$branch (:$remote_branch)]($style)'
symbol = " "
style = "bold #e06c75"

[aws]
format = '[$symbol(profile: "$profile" )(\(region: $region\) )]($style)'
disabled = true
style = 'bold #61afef'
symbol = " "

[golang]
format = '[ ](bold #56b6c2)'

[kubernetes]
symbol = '☸ '
disabled = true
detect_files = ['Dockerfile']
format = '[$symbol$context( \($namespace\))]($style) '
contexts = [
  { context_pattern = "arn:aws:eks:us-west-2:577926974532:cluster/zd-pvc-omer", style = "#98c379", context_alias = "omerxx", symbol = " " },
]

[docker_context]
disabled = true

[git_status]
style = "bold #c678dd"

[palettes.one_dark_pro]
background = "#282c34"
foreground = "#abb2bf"

black = "#282c34"
red = "#e06c75"
green = "#98c379"
yellow = "#e5c07b"
blue = "#61afef"
magenta = "#c678dd"
cyan = "#56b6c2"
white = "#abb2bf"

bright_black = "#5c6370"
bright_red = "#e06c75"
bright_green = "#98c379"
bright_yellow = "#d19a66"
bright_blue = "#61afef"
bright_magenta = "#c678dd"
bright_cyan = "#56b6c2"
bright_white = "#ffffff"
